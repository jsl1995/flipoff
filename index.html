<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111111">
  <title>FlipOff. — World Clock</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/board.css">
  <link rel="stylesheet" href="css/tile.css">
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    #board-container {
      width: min(1400px, 100%);
    }
  </style>
</head>
<body>
  <main id="board-container"></main>

  <script type="module">
    import { Board } from './js/Board.js';
    import { getTimeMessage } from './js/TimeMessage.js';
    import { MESSAGE_INTERVAL, TOTAL_TRANSITION } from './js/constants.js';

    const boardContainer = document.getElementById('board-container');
    const board = new Board(boardContainer, null);

    const renderClock = () => board.displayMessage(getTimeMessage());
    renderClock();
    setInterval(renderClock, MESSAGE_INTERVAL + TOTAL_TRANSITION);
  </script>
</body>
</html>
